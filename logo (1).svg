<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="12" fill="#0D1117"/>
  <rect width="48" height="48" rx="12" fill="url(#logoGrad)" opacity="0.9"/>

  <!-- Compass/globe base circle -->
  <circle cx="24" cy="24" r="13" stroke="#3FB950" stroke-width="1.5" fill="none" opacity="0.35"/>

  <!-- Compass needle - pointing up-right (travel direction) -->
  <path d="M24 13 L27.5 24 L24 21 L20.5 24 Z" fill="#3FB950"/>
  <path d="M24 35 L20.5 24 L24 27 L27.5 24 Z" fill="#3FB950" opacity="0.4"/>

  <!-- Horizontal axis line -->
  <line x1="13" y1="24" x2="35" y2="24" stroke="#3FB950" stroke-width="1" opacity="0.25"/>
  <!-- Vertical axis line -->
  <line x1="24" y1="13" x2="24" y2="35" stroke="#3FB950" stroke-width="1" opacity="0.25"/>

  <!-- Center dot -->
  <circle cx="24" cy="24" r="2.5" fill="#3FB950"/>

  <!-- Small rupee/currency spark top-right -->
  <circle cx="36" cy="12" r="5" fill="#E3B341" opacity="0.15"/>
  <text x="36" y="15.5" text-anchor="middle" font-size="7" fill="#E3B341" font-family="serif" font-weight="bold">₹</text>

  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0D2818"/>
    </linearGradient>
  </defs>
</svg>
